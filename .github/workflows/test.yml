name: Test

# 触发条件：push 到 dev 分支 + 提到 dev 的 Pull Request
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  test:
    name: Run vitest with database-per-worker isolation
    runs-on: ubuntu-latest
    # 测试套件预计 4-8 分钟，给 20 分钟兜底
    timeout-minutes: 20

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 装 Bun（项目用 bun 不是 npm）
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. 缓存 Docker layer：避免每次都重新 build PG 镜像（含 zhparser 编译，约 5 分钟）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-postgres-${{ hashFiles('docker/postgres/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-postgres-

      - name: Build PostgreSQL image (pgvector + pg_trgm + zhparser + scws)
        uses: docker/build-push-action@v5
        with:
          context: docker/postgres
          tags: lexseek-postgres:ci
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # buildx cache 双缓冲移位（避免无限增长）
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # 4. 启 PostgreSQL 容器
      - name: Start PostgreSQL
        run: |
          docker run -d --name pg \
            -e POSTGRES_USER=daixin \
            -e POSTGRES_PASSWORD=daixin88 \
            -e POSTGRES_DB=postgres \
            -e TZ=Asia/Shanghai \
            -p 5432:5432 \
            lexseek-postgres:ci

          # 等就绪（最多 60 秒）
          for i in {1..30}; do
            if docker exec pg pg_isready -U daixin 2>/dev/null; then
              echo "PostgreSQL ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      # 5. 缓存 bun 依赖
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # 6. 装项目依赖（postinstall 自动跑 nuxt prepare）
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 6.1 显式跑 prisma generate：origin 上 generated/prisma/ 偶尔跟 schema 不同步
      #     （schema 改了但 commit 时没跑 generate），强制重新生成保证 client 与 schema 一致
      - name: Generate Prisma client
        run: bun run prisma:generate

      # 7. 准备 .env.testing：基于 .env.example 模板 + 覆盖测试期望的关键值
      - name: Prepare .env.testing
        run: |
          cp .env.example .env.testing
          # 7.1 覆盖关键 env 让单元测试通过（业务代码读 useRuntimeConfig 拿到合法值，不会调真实外部服务）
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://daixin:daixin88@localhost:5432/ls_new_testing?schema=public\&TimeZone=UTC|' .env.testing
          # AgentEventBridge 队列容量测试期望 1000（.env.example 的 500000 是生产值）
          sed -i 's|^NUXT_AGENT_PENDING_QUEUE_MAX=.*|NUXT_AGENT_PENDING_QUEUE_MAX=1000|' .env.testing
          # OSS adapter 必填 bucket，测试期望非空（不会真调 OSS）
          sed -i 's|^NUXT_STORAGE_ALIYUN_OSS_BUCKET=.*|NUXT_STORAGE_ALIYUN_OSS_BUCKET=test-bucket|' .env.testing
          sed -i 's|^NUXT_STORAGE_ALIYUN_OSS_REGION=.*|NUXT_STORAGE_ALIYUN_OSS_REGION=oss-cn-hangzhou|' .env.testing
          sed -i 's|^NUXT_STORAGE_ALIYUN_OSS_ACCESS_KEY_ID=.*|NUXT_STORAGE_ALIYUN_OSS_ACCESS_KEY_ID=test-key-id|' .env.testing
          sed -i 's|^NUXT_STORAGE_ALIYUN_OSS_ACCESS_KEY_SECRET=.*|NUXT_STORAGE_ALIYUN_OSS_ACCESS_KEY_SECRET=test-key-secret|' .env.testing
          # Embedding URL 测试代码用 LangChain OpenAI client，构造时校验 URL 格式（非空也不行，要合法 URL）
          sed -i 's|^NUXT_EMBEDDING_BASE_URL=.*|NUXT_EMBEDDING_BASE_URL=https://api.example.com/v1|' .env.testing
          sed -i 's|^NUXT_EMBEDDING_API_KEY=.*|NUXT_EMBEDDING_API_KEY=test-embedding-key|' .env.testing
          sed -i 's|^NUXT_EMBEDDING_MODEL=.*|NUXT_EMBEDDING_MODEL=test-embedding-model|' .env.testing
          # JWT secret 测试用，非空即可
          sed -i 's|^NUXT_JWT_SECRET=.*|NUXT_JWT_SECRET=ci-test-jwt-secret-do-not-use-in-prod|' .env.testing

          # 7.2 补 .env.example 没有但测试需要的 key（用占位值，单元测试不会真调）
          cat >> .env.testing <<'EOF'
          NUXT_HNSW_EF_SEARCH=40
          NUXT_LAW_RERANK_THRESHOLD=0.5
          NUXT_MATERIAL_RERANK_THRESHOLD=0.5
          NUXT_RERANK_API_KEY=ci-placeholder
          NUXT_RERANK_BASE_URL=http://localhost:9999
          NUXT_RERANK_MODEL=ci-placeholder
          RERANKER_URL=http://localhost:9999
          EOF

      # 8. 创建源测试数据库 + 建表 + 灌 seed + 回填 tsv
      #    注意：db:setup 不跑 seedData.sql，但 setupRetrievalInfra.ts 用了 to_tsvector('chinese',...)
      #    依赖 seed 里建的 zhparser 中文搜索配置，所以 CI 必须显式跑一次 seed
      - name: Set up test database (ls_new_testing)
        env:
          DATABASE_URL: postgresql://daixin:daixin88@localhost:5432/ls_new_testing?schema=public&TimeZone=UTC
        run: |
          # 8.1 建空库
          docker exec pg psql -U daixin -d postgres -c "CREATE DATABASE ls_new_testing"

          # 8.2 prisma 建表（schema 同步）
          bun run prisma:push

          # 8.3 同步 skills 表（业务靠 server/plugins/skill-sync.ts 启动钩子，CI 不起 server 必须显式跑）
          #     seed 里的 node_skills INSERT 会引用 skills.name 作 FK，必须先填 skills
          bun run tsx server/scripts/syncSkillsForCI.ts

          # 8.4 灌 seed：含 'chinese' 文本搜索配置（zhparser）+ 系统用户/角色/权限/node_skills 关联
          docker cp prisma/seeds/seedData.sql pg:/tmp/seedData.sql
          docker exec pg psql -U daixin -d ls_new_testing -v ON_ERROR_STOP=1 -f /tmp/seedData.sql

          # 8.5 回填 tsv 数据（依赖 chinese 配置已存在）
          bun run server/scripts/setupRetrievalInfra.ts

      # 9. 跑全量测试
      #    CI runner 是 2 vCPU + 7GB RAM，开 4 worker 比较稳（本地默认 8 是为了 12 核机器）
      #    TZ=Asia/Shanghai：项目数据库时区 +8，部分测试断言依赖本地时区，CI 默认 UTC 会挂
      - name: Run vitest
        env:
          VITEST_MAX_WORKERS: 4
          NODE_OPTIONS: --max-old-space-size=6144
          TZ: Asia/Shanghai
        run: bun run test

      # 10. 失败时抓 PG 日志方便排查
      - name: Dump PostgreSQL logs on failure
        if: failure()
        run: docker logs pg | tail -100
