name: Test

# 触发条件：push 到 dev 分支 + 提到 dev 的 Pull Request
on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  test:
    name: Run vitest with database-per-worker isolation
    runs-on: ubuntu-latest
    # 测试套件预计 4-8 分钟，给 20 分钟兜底
    timeout-minutes: 20

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 装 Bun（项目用 bun 不是 npm）
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. 缓存 Docker layer：避免每次都重新 build PG 镜像（含 zhparser 编译，约 5 分钟）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-postgres-${{ hashFiles('docker/postgres/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-postgres-

      - name: Build PostgreSQL image (pgvector + pg_trgm + zhparser + scws)
        uses: docker/build-push-action@v5
        with:
          context: docker/postgres
          tags: lexseek-postgres:ci
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # buildx cache 双缓冲移位（避免无限增长）
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # 4. 启 PostgreSQL 容器
      - name: Start PostgreSQL
        run: |
          docker run -d --name pg \
            -e POSTGRES_USER=daixin \
            -e POSTGRES_PASSWORD=daixin88 \
            -e POSTGRES_DB=postgres \
            -e TZ=Asia/Shanghai \
            -p 5432:5432 \
            lexseek-postgres:ci

          # 等就绪（最多 60 秒）
          for i in {1..30}; do
            if docker exec pg pg_isready -U daixin 2>/dev/null; then
              echo "PostgreSQL ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      # 5. 缓存 bun 依赖
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # 6. 装项目依赖（postinstall 自动跑 nuxt prepare）
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 7. 准备 .env.testing：基于 .env.example 模板 + 覆盖 DATABASE_URL
      - name: Prepare .env.testing
        run: |
          cp .env.example .env.testing
          # 用 sed 替换 DATABASE_URL 行
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://daixin:daixin88@localhost:5432/ls_new_testing?schema=public\&TimeZone=UTC|' .env.testing
          # 补 .env.example 没有但测试需要的 key（用占位值，单元测试不会真调）
          cat >> .env.testing <<'EOF'
          NUXT_HNSW_EF_SEARCH=40
          NUXT_LAW_RERANK_THRESHOLD=0.5
          NUXT_MATERIAL_RERANK_THRESHOLD=0.5
          NUXT_RERANK_API_KEY=ci-placeholder
          NUXT_RERANK_BASE_URL=http://localhost:9999
          NUXT_RERANK_MODEL=ci-placeholder
          RERANKER_URL=http://localhost:9999
          EOF

      # 8. 创建源测试数据库 + 跑 prisma push + 初始化检索基建
      #    prisma.config.ts 默认 dotenv 加载 .env（不读 .env.testing），
      #    必须显式给这步注入 DATABASE_URL；setupRetrievalInfra.ts 也直接读 process.env.DATABASE_URL
      - name: Set up test database (ls_new_testing)
        env:
          DATABASE_URL: postgresql://daixin:daixin88@localhost:5432/ls_new_testing?schema=public&TimeZone=UTC
        run: |
          docker exec pg psql -U daixin -d postgres -c "CREATE DATABASE ls_new_testing"
          bun run db:setup

      # 9. 跑全量测试
      #    CI runner 是 2 vCPU + 7GB RAM，开 4 worker 比较稳（本地默认 8 是为了 12 核机器）
      - name: Run vitest
        env:
          VITEST_MAX_WORKERS: 4
          NODE_OPTIONS: --max-old-space-size=6144
        run: bun run test

      # 10. 失败时抓 PG 日志方便排查
      - name: Dump PostgreSQL logs on failure
        if: failure()
        run: docker logs pg | tail -100
