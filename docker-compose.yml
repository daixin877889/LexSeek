# Docker Compose 配置文件
# 使用方式: docker compose up -d

services:
  # LexSeek 应用服务
  lexseek:
    build:
      context: .
      dockerfile: Dockerfile
    image: lexseek:latest
    container_name: lexseek-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 基础配置
      - NODE_ENV=production
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      # 数据库连接（必填）
      - DATABASE_URL=${DATABASE_URL}
      # JWT 配置
      - NUXT_JWT_SECRET=${NUXT_JWT_SECRET:-lexseek_jwt_secret}
      - NUXT_JWT_EXPIRES_IN=${NUXT_JWT_EXPIRES_IN:-30d}
      # 认证配置
      - NUXT_AUTH_COOKIE_NAME=${NUXT_AUTH_COOKIE_NAME:-auth_token}
      - NUXT_AUTH_COOKIE_MAX_AGE=${NUXT_AUTH_COOKIE_MAX_AGE:-2592000}
      # 应用 URL（用于支付回调等）
      - NUXT_PUBLIC_BASE_URL=${NUXT_PUBLIC_BASE_URL}
      # 阿里云基础配置
      - NUXT_ALIYUN_ACCESS_KEY_ID=${NUXT_ALIYUN_ACCESS_KEY_ID}
      - NUXT_ALIYUN_ACCESS_KEY_SECRET=${NUXT_ALIYUN_ACCESS_KEY_SECRET}
      # 阿里云短信配置
      - NUXT_ALIYUN_SMS_ENABLE=${NUXT_ALIYUN_SMS_ENABLE:-false}
      - NUXT_ALIYUN_SMS_SIGN_NAME=${NUXT_ALIYUN_SMS_SIGN_NAME}
      - NUXT_ALIYUN_SMS_TEMPLATE_CAPTCHA_CODE=${NUXT_ALIYUN_SMS_TEMPLATE_CAPTCHA_CODE}
      - NUXT_ALIYUN_SMS_RATE_LIMIT_MS=${NUXT_ALIYUN_SMS_RATE_LIMIT_MS:-60}
      - NUXT_ALIYUN_SMS_CODE_EXPIRE_MS=${NUXT_ALIYUN_SMS_CODE_EXPIRE_MS:-300}
      - NUXT_ALIYUN_SMS_MAX_FAILURES=${NUXT_ALIYUN_SMS_MAX_FAILURES:-5}
      - NUXT_ALIYUN_SMS_LOCK_DURATION_MS=${NUXT_ALIYUN_SMS_LOCK_DURATION_MS:-900}
      # 存储配置
      - NUXT_STORAGE_DEFAULT_TYPE=${NUXT_STORAGE_DEFAULT_TYPE:-aliyun_oss}
      - NUXT_STORAGE_CALLBACK_URL=${NUXT_STORAGE_CALLBACK_URL}
      - NUXT_STORAGE_BASE_PATH=${NUXT_STORAGE_BASE_PATH}
      # 阿里云 OSS 配置
      - NUXT_STORAGE_ALIYUN_OSS_ACCESS_KEY_ID=${NUXT_STORAGE_ALIYUN_OSS_ACCESS_KEY_ID}
      - NUXT_STORAGE_ALIYUN_OSS_ACCESS_KEY_SECRET=${NUXT_STORAGE_ALIYUN_OSS_ACCESS_KEY_SECRET}
      - NUXT_STORAGE_ALIYUN_OSS_BUCKET=${NUXT_STORAGE_ALIYUN_OSS_BUCKET}
      - NUXT_STORAGE_ALIYUN_OSS_REGION=${NUXT_STORAGE_ALIYUN_OSS_REGION}
      - NUXT_STORAGE_ALIYUN_OSS_CUSTOM_DOMAIN=${NUXT_STORAGE_ALIYUN_OSS_CUSTOM_DOMAIN}
      # 阿里云 OSS STS 配置（可选）
      - NUXT_STORAGE_ALIYUN_OSS_STS_ROLE_ARN=${NUXT_STORAGE_ALIYUN_OSS_STS_ROLE_ARN}
      - NUXT_STORAGE_ALIYUN_OSS_STS_ROLE_SESSION_NAME=${NUXT_STORAGE_ALIYUN_OSS_STS_ROLE_SESSION_NAME:-lexseek-oss-session}
      - NUXT_STORAGE_ALIYUN_OSS_STS_DURATION_SECONDS=${NUXT_STORAGE_ALIYUN_OSS_STS_DURATION_SECONDS:-3600}
      # 微信公众号配置
      - NUXT_PUBLIC_WECHAT_APP_ID=${NUXT_PUBLIC_WECHAT_APP_ID}
      - NUXT_WECHAT_MP_SECRET=${NUXT_WECHAT_MP_SECRET}
      - NUXT_PUBLIC_WECHAT_AUTH_CALLBACK_URL=${NUXT_PUBLIC_WECHAT_AUTH_CALLBACK_URL}
      - NUXT_WECHAT_AUTH_REDIRECT_WHITELIST=${NUXT_WECHAT_AUTH_REDIRECT_WHITELIST}
      # 微信支付配置
      - NUXT_WECHAT_PAY_MCH_ID=${NUXT_WECHAT_PAY_MCH_ID}
      - NUXT_WECHAT_PAY_API_V3_KEY=${NUXT_WECHAT_PAY_API_V3_KEY}
      - NUXT_WECHAT_PAY_SERIAL_NO=${NUXT_WECHAT_PAY_SERIAL_NO}
      - NUXT_WECHAT_PAY_PRIVATE_KEY=${NUXT_WECHAT_PAY_PRIVATE_KEY}
      - NUXT_WECHAT_PAY_NOTIFY_URL=${NUXT_WECHAT_PAY_NOTIFY_URL}
      - NUXT_WECHAT_PAY_PLATFORM_CERT=${NUXT_WECHAT_PAY_PLATFORM_CERT}
      # 向量模型配置
      - NUXT_EMBEDDING_API_KEY=${NUXT_EMBEDDING_API_KEY}
      - NUXT_EMBEDDING_BASE_URL=${NUXT_EMBEDDING_BASE_URL}
      - NUXT_EMBEDDING_MODEL=${NUXT_EMBEDDING_MODEL:-text-embedding-v4}
      # Redis 配置
      - NUXT_REDIS_URL=${NUXT_REDIS_URL}
      # Agent 后台任务队列配置
      - NUXT_AGENT_DATABASE_URL=${NUXT_AGENT_DATABASE_URL}
      - NUXT_AGENT_MAX_CONCURRENT=${NUXT_AGENT_MAX_CONCURRENT:-10}
      - NUXT_AGENT_MAX_USER_CONCURRENT=${NUXT_AGENT_MAX_USER_CONCURRENT:-2}
      - NUXT_AGENT_TIMEOUT_MS=${NUXT_AGENT_TIMEOUT_MS:-3600000}
      - NUXT_AGENT_HEARTBEAT_INTERVAL_MS=${NUXT_AGENT_HEARTBEAT_INTERVAL_MS:-15000}
      - NUXT_AGENT_CRASH_THRESHOLD_MS=${NUXT_AGENT_CRASH_THRESHOLD_MS:-60000}
      - NUXT_AGENT_PENDING_QUEUE_MAX=${NUXT_AGENT_PENDING_QUEUE_MAX:-500000}
      # LangSmith 配置（可选）
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}
      # 日志级别
      - NUXT_PUBLIC_LOG_LEVEL=${NUXT_PUBLIC_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - lexseek-network
    # 可选：挂载日志目录（如果需要持久化日志）
    # volumes:
    #   - ./logs:/app/logs

networks:
  lexseek-network:
    driver: bridge
