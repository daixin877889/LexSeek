<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>LexSeek · Marketing UI Kit</title>
<link rel="icon" href="../../assets/logo.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--background); color: var(--foreground); }
  #root { min-height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="../useTheme.jsx"></script>
<script type="text/babel" src="MarketingNav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="PainPoints.jsx"></script>
<script type="text/babel" src="FeatureGrid.jsx"></script>
<script type="text/babel" src="WorkflowSteps.jsx"></script>
<script type="text/babel" src="ToolsGrid.jsx"></script>
<script type="text/babel" src="CTASection.jsx"></script>
<script type="text/babel" src="MarketingFooter.jsx"></script>

<script type="text/babel">
function App() {
  const [theme, toggleTheme] = useTheme();
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  return (
    <div style={{ background: 'var(--background)', color: 'var(--foreground)', fontFamily: 'var(--font-sans)' }}>
      <MarketingNav current="/" theme={theme} onToggleTheme={toggleTheme} onMobileMenu={() => setDrawerOpen(true)} />
      <MarketingMobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} current="/" />
      <main>
        <Hero />
        <PainPoints />
        <FeatureGrid />
        <WorkflowSteps />
        <ToolsGrid />
        <CTASection />
      </main>
      <MarketingFooter />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
